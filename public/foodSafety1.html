<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>anim-3d-obj – Food Safety 1</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui; background: #1a1a2e; color: #eee;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px; gap: 40px; margin: 0;
    }
    h2 { margin: 0; }
    .demo { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .demo p { margin: 0; font-size: 13px; opacity: 0.6; max-width: 300px; text-align: center; }
    .obj-box { min-height: 500px; display: flex; align-items: flex-start; justify-content: center; padding-top: 20px; }
    button {
      padding: 8px 22px; font-size: 14px; border: 1px solid #555;
      border-radius: 6px; background: #2a2a4a; color: #eee; cursor: pointer;
    }
    button:hover { background: #3a3a6a; }
    .phase-tag {
      font-size: 12px; padding: 3px 10px; border-radius: 4px;
      background: #333; font-family: monospace;
    }

    /* ---- Face 1: Title card ---- */
    .title-card {
      display: flex; align-items: center; justify-content: center;
      padding: 16px 20px;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 18px; font-weight: bold; color: #1a3a1a;
      text-align: center; line-height: 1.3;
      cursor: pointer;
      user-select: none;
    }

    /* ---- Face 2: Tile content overlay ---- */
    .tile-content {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      background: #f5f5f0;
      border-radius: 0;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }
    .tile-content.revealed { opacity: 1; }

    .tile-img {
      width: 100%; height: 55%;
      object-fit: cover;
      background: linear-gradient(135deg, #5a3e2b 0%, #8b6914 40%, #a07030 100%);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .tile-img img {
      width: 100%; height: 100%; object-fit: cover;
    }
    /* SVG placeholder illustration for the slow cooker */
    .tile-img svg { width: 80%; height: 80%; }

    .tile-body {
      flex: 1; padding: 16px 18px 14px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .tile-body h3 {
      margin: 0; font-size: 16px; font-weight: bold; color: #1a1a1a;
      font-family: Georgia, 'Times New Roman', serif;
    }
    .tile-body p {
      margin: 0; font-size: 13px; color: #444; line-height: 1.5;
      text-align: left; opacity: 1;
    }
    .tile-btn {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: auto; padding: 8px 18px;
      background: #2d5a27; color: #fff; border: none;
      border-radius: 4px; font-size: 13px; font-weight: 600;
      cursor: pointer; width: fit-content;
    }
    .tile-btn:hover { background: #1e4a19; }
    .tile-btn::after { content: '→'; }
  </style>
</head>
<body>
  <h2>Food Safety – Fold &amp; Expand</h2>
  <p style="opacity:0.5; margin:0;">Click the title card. It unfolds, expands, then reveals the tile content.</p>

  <div class="demo">
    <div class="obj-box" id="d1"></div>
    <button id="b1">Unfold + Expand</button>
    <div class="phase-tag" id="p1">folded</div>
    <p>Face 1 → fold out → Face 2 expands → content fades in</p>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <link rel="stylesheet" href="../dist/index.css" />

  <script type="module">
    import { Obj } from '../dist/index.js';
    const h = React.createElement;

    /* ========================================================
       Tile content component — sits inside Face 2.
       Fades in when `revealed` becomes true.
       ======================================================== */
    function TileOverlay({ revealed }) {
      return h('div', {
        className: 'tile-content' + (revealed ? ' revealed' : ''),
      },
        /* Image area — inline SVG slow-cooker illustration */
        h('div', { className: 'tile-img' },
          h('svg', { viewBox: '0 0 200 160', xmlns: 'http://www.w3.org/2000/svg' },
            // pot body
            h('ellipse', { cx: 100, cy: 110, rx: 70, ry: 30, fill: '#333' }),
            h('rect', { x: 30, y: 60, width: 140, height: 52, rx: 8, fill: '#444' }),
            h('ellipse', { cx: 100, cy: 60, rx: 70, ry: 20, fill: '#555' }),
            // lid
            h('ellipse', { cx: 100, cy: 50, rx: 65, ry: 16, fill: '#666' }),
            h('rect', { x: 88, y: 34, width: 24, height: 10, rx: 5, fill: '#888' }),
            // steam
            h('path', { d: 'M60 30 Q65 10 70 30', stroke: '#ccc', strokeWidth: 2, fill: 'none', opacity: 0.5 }),
            h('path', { d: 'M90 24 Q95 4 100 24', stroke: '#ccc', strokeWidth: 2, fill: 'none', opacity: 0.6 }),
            h('path', { d: 'M120 30 Q125 10 130 30', stroke: '#ccc', strokeWidth: 2, fill: 'none', opacity: 0.5 }),
            // veggies peeking out
            h('circle', { cx: 80, cy: 55, r: 6, fill: '#e87f3a' }),
            h('circle', { cx: 105, cy: 52, r: 5, fill: '#7cb342' }),
            h('circle', { cx: 120, cy: 56, r: 5, fill: '#e8a33a' }),
          )
        ),
        /* Text body */
        h('div', { className: 'tile-body' },
          h('h3', null, 'Slow Cookers and Food Safety'),
          h('p', null,
            'At any time of year, a slow cooker can make life a little more convenient because by planning ahead, you save time later.'
          ),
          h('button', { className: 'tile-btn' }, 'Learn More '),
        )
      );
    }

    /* ========================================================
       Main demo
       ======================================================== */
    function Demo() {
      const [flat, setFlat] = React.useState(false);
      const [phase, setPhase] = React.useState('folded');
      const [revealed, setRevealed] = React.useState(false);

      const btn = document.getElementById('b1');
      const ptag = document.getElementById('p1');

      React.useEffect(() => {
        const handler = () => setFlat(f => !f);
        btn.addEventListener('click', handler);
        return () => btn.removeEventListener('click', handler);
      }, []);

      React.useEffect(() => {
        btn.textContent = flat ? 'Reverse' : 'Unfold + Expand';
      }, [flat]);

      /* Also allow clicking face 1 itself to trigger */
      React.useEffect(() => {
        const face = document.querySelector('.title-card');
        if (!face) return;
        const handler = () => { if (!flat) setFlat(true); };
        face.addEventListener('click', handler);
        return () => face.removeEventListener('click', handler);
      }, [flat]);

      const updatePhase = (p) => {
        setPhase(p);
        ptag.textContent = p;
      };

      return h(Obj, {
        width: 260, height: 140, depth: 260,
        perspective: 800,
        flat,
        transitionDuration: 0.8,
        oneAtATime: false,
        backfaceHidden: true,
        faces: [
          {
            name: 'front',
            body: h('div', { className: 'title-card' }, 'Slow Cookers and\u00A0Food\u00A0Safety'),
            style: {
              background: 'linear-gradient(145deg, #d4e8c2, #a8cc8c)',
              border: '1px solid rgba(0,0,0,0.1)',
              borderRadius: '8px',
              boxShadow: '0 2px 8px rgba(0,0,0,0.15)',
            },
          },
          {
            name: 'right',
            body: h(TileOverlay, { revealed }),
            style: {
              background: '#f5f5f0',
              border: '1px solid rgba(0,0,0,0.1)',
              borderRadius: '8px',
              boxShadow: '0 4px 16px rgba(0,0,0,0.2)',
              overflow: 'hidden',
              position: 'relative',
            },
          },
        ],
        chainEffects: [
          {
            faceName: 'right',
            scaleY: 2.8,
            scaleX: 1.1,
            duration: 0.7,
            timing: 'ease-in-out',
            keepAligned: 'top',
          },
        ],
        onChainComplete: () => {
          updatePhase('expanded');
          /* Small delay so scale finishes painting before fade-in */
          setTimeout(() => setRevealed(true), 60);
        },
        onChainReverseComplete: () => {
          updatePhase('folded');
          setRevealed(false);
        },
      });
    }

    ReactDOM.createRoot(document.getElementById('d1')).render(h(Demo));
  </script>
</body>
</html>
