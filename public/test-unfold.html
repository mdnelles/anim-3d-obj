<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>anim-3d-obj – Unfold Test</title>
  <style>
    body {
      font-family: system-ui;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      gap: 30px;
    }
    h2 { margin: 0; }
    .demo { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    button {
      padding: 10px 28px;
      font-size: 16px;
      border: 1px solid #555;
      border-radius: 6px;
      background: #2a2a4a;
      color: #eee;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #3a3a6a; }
    .obj-container { min-height: 200px; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <h2>Unfold Demo – 4-sided cuboid</h2>
  <div class="demo">
    <div class="obj-container" id="app"></div>
    <button id="toggle">Unfold</button>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <link rel="stylesheet" href="../dist/index.css" />

  <script type="module">
    import { Obj } from '../dist/index.js';
    const h = React.createElement;

    const faceStyle = (bg) => ({
      background: bg,
      border: '1px solid rgba(255,255,255,0.2)',
      color: '#fff',
      fontSize: '32px',
      fontWeight: 'bold',
    });

    function App() {
      const [flat, setFlat] = React.useState(false);

      return h('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 20 } },
        h(Obj, {
          width: 120,
          height: 120,
          depth: 120,
          perspective: 800,
          flat: flat,
          transitionDuration: 1.2,
          faces: [
            { name: 'front', body: '1', style: faceStyle('rgba(66,133,244,0.85)') },
            { name: 'right', body: '2', style: faceStyle('rgba(234,67,53,0.85)') },
            { name: 'back',  body: '3', style: faceStyle('rgba(251,188,4,0.85)') },
            { name: 'left',  body: '4', style: faceStyle('rgba(52,168,83,0.85)') },
          ],
          anim1: { name: 'Y360', duration: 6, timing: 'linear', iterationCount: 'infinite' },
        }),
        h('button', {
          onClick: () => {
            setFlat(f => !f);
            document.getElementById('toggle').textContent = flat ? 'Unfold' : 'Fold';
          },
          id: 'toggle-inner'
        })
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(h(App));

    // Wire up the outer button
    document.getElementById('toggle').addEventListener('click', () => {
      // Trigger a click on the inner React button approach —
      // actually let's just re-render with state from outside
    });

    // Simpler: use a global flag and re-render
    let isFlat = false;
    function render() {
      root.render(h(App));
    }

    // Override: mount App properly with its own state
    // The App component above manages its own state via useState,
    // just need the outer button to trigger it.
    document.getElementById('toggle').addEventListener('click', () => {
      // We'll dispatch a custom event the App can listen to
      window.dispatchEvent(new CustomEvent('toggle-flat'));
    });

    // Re-mount with proper event listening
    function App2() {
      const [flat, setFlat] = React.useState(false);

      React.useEffect(() => {
        const handler = () => setFlat(f => !f);
        window.addEventListener('toggle-flat', handler);
        return () => window.removeEventListener('toggle-flat', handler);
      }, []);

      React.useEffect(() => {
        document.getElementById('toggle').textContent = flat ? 'Fold' : 'Unfold';
      }, [flat]);

      return h(Obj, {
        width: 120,
        height: 120,
        depth: 120,
        perspective: 800,
        flat: flat,
        transitionDuration: 1.2,
        faces: [
          { name: 'front', body: h('span', null, '1'), style: faceStyle('rgba(66,133,244,0.85)') },
          { name: 'right', body: h('span', null, '2'), style: faceStyle('rgba(234,67,53,0.85)') },
          { name: 'back',  body: h('span', null, '3'), style: faceStyle('rgba(251,188,4,0.85)') },
          { name: 'left',  body: h('span', null, '4'), style: faceStyle('rgba(52,168,83,0.85)') },
        ],
        anim1: { name: 'Y360', duration: 6, timing: 'linear', iterationCount: 'infinite' },
      });
    }

    root.render(h(App2));
  </script>
</body>
</html>
