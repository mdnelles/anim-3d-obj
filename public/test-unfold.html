<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>anim-3d-obj – Unfold Tests</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui; background: #1a1a2e; color: #eee;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px; gap: 50px; margin: 0;
    }
    h2 { margin: 0; }
    .row { display: flex; gap: 60px; flex-wrap: wrap; justify-content: center; }
    .demo { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .demo p { margin: 0; font-size: 13px; opacity: 0.6; }
    .obj-box { min-height: 180px; display: flex; align-items: center; justify-content: center; }
    button {
      padding: 8px 22px; font-size: 14px; border: 1px solid #555;
      border-radius: 6px; background: #2a2a4a; color: #eee; cursor: pointer;
    }
    button:hover { background: #3a3a6a; }
  </style>
</head>
<body>
  <h2>Unfold Demo – 4 Modes</h2>
  <div class="row">
    <div class="demo"><div class="obj-box" id="d1"></div><button id="b1">Unfold</button><p>Standard</p></div>
    <div class="demo"><div class="obj-box" id="d2"></div><button id="b2">Unfold</button><p>oneAtATime</p></div>
    <div class="demo"><div class="obj-box" id="d3"></div><button id="b3">Unfold</button><p>remainJoined</p></div>
    <div class="demo"><div class="obj-box" id="d4"></div><button id="b4">Unfold</button><p>both</p></div>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <link rel="stylesheet" href="../dist/index.css" />

  <script type="module">
    import { Obj } from '../dist/index.js';
    const h = React.createElement;

    const fs = (bg) => ({
      background: bg,
      border: '1px solid rgba(255,255,255,0.25)',
      color: '#fff', fontSize: '28px', fontWeight: 'bold',
    });

    const faces = [
      { name: 'front', body: '1', style: fs('rgba(66,133,244,0.85)') },
      { name: 'right', body: '2', style: fs('rgba(234,67,53,0.85)') },
      { name: 'back',  body: '3', style: fs('rgba(251,188,4,0.85)') },
      { name: 'left',  body: '4', style: fs('rgba(52,168,83,0.85)') },
    ];

    function Demo({ id, oneAtATime, remainJoined }) {
      const [flat, setFlat] = React.useState(false);
      const btn = document.getElementById('b' + id);

      React.useEffect(() => {
        const handler = () => setFlat(f => !f);
        btn.addEventListener('click', handler);
        return () => btn.removeEventListener('click', handler);
      }, []);

      React.useEffect(() => {
        btn.textContent = flat ? 'Fold' : 'Unfold';
      }, [flat]);

      return h(Obj, {
        width: 100, height: 100, depth: 100,
        perspective: 700,
        flat, transitionDuration: 0.8,
        oneAtATime, remainJoined,
        faces,
        anim1: { name: 'Y360', duration: 6, timing: 'linear', iterationCount: 'infinite' },
      });
    }

    [
      { id: '1', oneAtATime: false, remainJoined: false },
      { id: '2', oneAtATime: true,  remainJoined: false },
      { id: '3', oneAtATime: false, remainJoined: true },
      { id: '4', oneAtATime: true,  remainJoined: true },
    ].forEach(cfg => {
      ReactDOM.createRoot(document.getElementById('d' + cfg.id))
        .render(h(Demo, cfg));
    });
  </script>
</body>
</html>
